# .github/workflows/ci.yml
#
# IMPACT Continuous Integration Workflow.
# Triggers on developer pushes and pull requests to main/master branches.
# Runs unit tests, database migration tests, and architectural regression suites.

name: IMPACT CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run Verification & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Database Migration Verification Tests
        run: |
          python3 tests/test_db_migration.py

      - name: Run Architectural Regression Testing Suite
        run: |
          python3 tests/test_regression.py

      - name: Run Schema Validator Checks on Samples
        run: |
          python3 core/shacl_validator.py test_projects/v1_graph.json
          python3 core/shacl_validator.py test_projects/v2_graph.json
